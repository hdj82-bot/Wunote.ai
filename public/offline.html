<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오프라인 — Wunote</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #111827;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      text-align: center;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { font-size: 1rem; color: #6b7280; max-width: 28rem; line-height: 1.6; }
    .retry {
      margin-top: 2rem;
      padding: 0.625rem 1.5rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
    }
    .retry:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>인터넷 연결이 없습니다</h1>
  <p>현재 오프라인 상태입니다. 이전에 방문한 페이지는 캐시에서 볼 수 있으며, 연결이 복구되면 자동으로 동기화됩니다.</p>
  <button class="retry" onclick="location.reload()">다시 시도</button>
</body>
</html>
